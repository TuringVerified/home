<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turing Tested</title>

<!-- Xterm.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>

<!-- Custom Styles -->
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">
    <header>
        <h1>Turing Tested</h1>
        <div class="tagline">FOSS shill</div>
    </header>

    <div class="interests">
        Interested in system administration, the Linux kernel, and decentralised technologies.
    </div>

    <div class="terminal-wrapper">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <div class="circle circle-red"></div>
                <div class="circle circle-yellow"></div>
                <div class="circle circle-green"></div>
            </div>
            <div class="terminal-title">turing@tested:~</div>
            <div class="terminal-spacer"></div>
        </div>
        <div id="terminal"></div>
    </div>
</div>

<script type="module">
import { init, Terminal as GhosttyTerminal } from "https://cdn.jsdelivr.net/npm/ghostty-web/+esm";

let term;

try {

    await init();

    term = new GhosttyTerminal({
        cursorBlink: true,
        fontSize: 15,
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        theme: {
            background: "#020202",
            foreground: "#00ff9c",
            cursor: "#00ff9c",
            cursorAccent: "#020202",
            selection: "rgba(0, 255, 156, 0.3)",
        }
    });

} catch (e) {

    console.warn("Falling back to Xterm...", e);

    term = new window.Terminal({
        cursorBlink: true,
        fontSize: 15,
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        theme: {
            background: "#020202",
            foreground: "#00ff9c",
            cursor: "#00ff9c",
            cursorAccent: "#020202",
            selection: "rgba(0, 255, 156, 0.3)",
        }
    });
}

term.open(document.getElementById("terminal"));

if (term.focus) {
    term.focus();
}

let buffer = "";

/*
    Prompt renderer.
*/
function prompt() {
    term.write("\x1b[1m[turing@tested ~]$\x1b[0m ");
}

/*
    Future shell engine boundary.

    Later this becomes:
        wasm.executeCommand(input)

    JS should only:
    - send text
    - receive text
*/
function executeCommand(input) {

    if (input === "") {
        return "";
    }

    return `You typed: ${input}`;
}

term.write("Use `help` to list available commands.\r\n");

prompt();

term.onData(e => {

    // ENTER
    if (e === "\r") {

        const input = buffer.trim();

        buffer = "";

        const output = executeCommand(input);

        term.write("\r\n");

        if (output !== "") {
            term.write(output);
        }

        term.write("\r\n");

        prompt();
    }

    // CTRL+C
    else if (e === "\u0003") {

        term.write("^C\r\n");

        buffer = "";

        prompt();
    }

    // BACKSPACE
    else if (e === "\u007f") {

        if (buffer.length > 0) {

            buffer = buffer.slice(0, -1);

            term.write("\b \b");
        }
    }

    // NORMAL CHARACTER
    else {

        buffer += e;

        term.write(e);
    }
});
</script>

</body>
</html>
