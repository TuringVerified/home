<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My CV</title>
  <style>
      html, body {
      height: 100%;
      margin: 0; /* Resets default browser body margin */
      padding: 0;
  }

  .full-page-element {
      height: 100%;
      width: 100%; /* Optional as divs are block-level */
  }

  </style>
</head>
<body>
  <div class="full-page-element">
<object
  data="{{ url_for('static', filename='cv.pdf') }}"
  type="application/pdf"
  width="100%"
  height="100%"
>
  <p>
    Your browser does not support PDFs. <a href="{{ url_for('static', filename='cv.pdf') }}">Download the PDF</a>.
  </p>
</object>
</div>
</body>
</html>
