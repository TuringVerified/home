name: Deploy to Self-Hosted Runner

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    # Only run if this is the original repository, not a fork
    if: github.repository == 'TuringVerified/home' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Deploy via Docker Compose
        run: |
          echo "Building and restarting the Docker container..."
          docker compose up -d --build
